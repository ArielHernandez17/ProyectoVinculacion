<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Revisor de Limpieza - FES Aragón</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="container">
        <h1>Panel de Revisor</h1>
        <div class="user-info" id="userInfo"></div>

        <!-- Filtros por estado -->
        <div class="filtros" style="margin-bottom: 20px;">
            <button onclick="filtrarPorEstado(null)">Todas</button>
            <button onclick="filtrarPorEstado('Pendiente')">Pendientes</button>
            <button onclick="filtrarPorEstado('En Proceso')">En Proceso</button>
        </div>

        <h2>Incidencias</h2>
        <table id="incidenciasTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Edificio</th>
                    <th>Salón</th>
                    <th>Descripción</th>
                    <th>Estado</th>
                    <th>Comentario</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <!-- Controles de paginación -->
        <div id="paginacion" style="margin-top: 20px; text-align: center;">
            <button id="btn-anterior" onclick="cambiarPaginaIncidencias(-1)">Anterior</button>
            <span>Página <span id="pagina-actual">1</span> de <span id="total-paginas">1</span></span>
            <button id="btn-siguiente" onclick="cambiarPaginaIncidencias(1)">Siguiente</button>
        </div>

        <button id="logoutBtn" class="logout">Cerrar sesión</button>
    </div>
    <script src="/js/main.js"></script>
</body>
</html>
