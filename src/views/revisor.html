<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Revisor de Limpieza - FES Aragón</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="container">
        <div class="user-info" id="userInfo"></div>

        <div class="main-grid">
            <div class="content-scroll">
                <div class="card">
                    <div class="card-header">
                        <h2>Incidencias Pendientes y en Proceso</h2>
                    </div>
                    <div class="filters-bar">
                        <div class="filter-group">
                            <label>Filtrar por estado</label>
                            <div>
                                <button class="btn-outline" onclick="filtrarPorEstado(null)">Todas</button>
                                <button class="btn-outline" onclick="filtrarPorEstado('Pendiente')">Pendientes</button>
                                <button class="btn-outline" onclick="filtrarPorEstado('En Proceso')">En Proceso</button>
                            </div>
                        </div>
                    </div>
                    <table id="incidenciasTable">
                        <thead>
                            <tr>
                                <th>ID</th><th>Edificio</th><th>Salón</th><th>Descripción</th>
                                <th>Estado</th><th>Comentario</th><th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                    <div class="pagination">
                        <button id="btn-anterior" onclick="cambiarPaginaIncidencias(-1)">Anterior</button>
                        <span>Página <span id="pagina-actual">1</span> de <span id="total-paginas">1</span></span>
                        <button id="btn-siguiente" onclick="cambiarPaginaIncidencias(1)">Siguiente</button>
                    </div>
                </div>
            </div>
        </div>

        <button id="logoutBtn" class="logout">Cerrar sesión</button>
    </div>
    <script src="/js/main.js"></script>
</body>
</html>
