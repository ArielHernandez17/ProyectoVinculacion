<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Revisor de Limpieza - FES Aragón</title>
    <!-- Misma hoja de estilos global -->
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="container">
        <!-- Muestra nombre, rol y correo del usuario autenticado -->
        <div class="user-info" id="userInfo"></div>

        <div class="main-grid">
            <div class="content-scroll">
                <div class="card">
                    <div class="card-header">
                        <h2>Incidencias Pendientes y en Proceso</h2>
                    </div>
                    <!-- Filtros rápidos con botones (Todas, Pendientes, En Proceso) -->
                    <div class="filters-bar">
                        <div class="filter-group">
                            <label>Filtrar por estado</label>
                            <div>
                                <button class="btn-outline" onclick="filtrarPorEstado(null)">Todas</button>
                                <button class="btn-outline" onclick="filtrarPorEstado('Pendiente')">Pendientes</button>
                                <button class="btn-outline" onclick="filtrarPorEstado('En Proceso')">En Proceso</button>
                            </div>
                        </div>
                    </div>
                    <!-- Tabla de incidencias con acciones: cambiar estado, subir foto, ver foto -->
                    <table id="incidenciasTable">
                        <thead>
                            <tr>
                                <th>ID</th><th>Edificio</th><th>Salón</th><th>Descripción</th>
                                <th>Estado</th><th>Comentario</th><th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                    <!-- Paginación (5 incidencias por página, controles con funciones globales) -->
                    <div class="pagination">
                        <button id="btn-anterior" onclick="cambiarPaginaIncidencias(-1)">Anterior</button>
                        <span>Página <span id="pagina-actual">1</span> de <span id="total-paginas">1</span></span>
                        <button id="btn-siguiente" onclick="cambiarPaginaIncidencias(1)">Siguiente</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Botón de cierre de sesión (limpia sessionStorage y redirige a login) -->
        <button id="logoutBtn" class="logout">Cerrar sesión</button>
    </div>
    <!-- Lógica de la vista revisor (carga de incidencias, cambios de estado, subida de imágenes) -->
    <script src="/js/main.js"></script>
</body>
</html>
